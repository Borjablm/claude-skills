<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>{{label}}</title>
<style>
  :root {
    --accent: %ACCENT%;
    --dark: %DARK%;
    --light: %LIGHT%;
    --pop: %POP%;
    --font-family: %FONT_STACK%;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-family);
    background: var(--light);
    color: var(--dark);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
  }
  .card {
    background: white;
    border-left: 12px solid var(--accent);
    padding: 60px 70px;
    border-radius: 0 12px 12px 0;
    max-width: 90%;
    text-align: left;
  }
  .eyebrow {
    font-size: 18px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .value {
    font-size: 140px;
    font-weight: 700;
    line-height: 1;
    color: var(--dark);
    margin-bottom: 16px;
  }
  .label {
    font-size: 32px;
    font-weight: 500;
    line-height: 1.3;
    color: var(--dark);
    margin-bottom: 32px;
  }
  .source {
    font-size: 16px;
    color: var(--dark);
    opacity: 0.6;
    border-top: 1px solid #e5e7eb;
    padding-top: 16px;
  }
  .source-prefix {
    font-weight: 600;
    color: var(--dark);
    opacity: 1;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">{{eyebrow}}</div>
    <div class="value">{{value}}</div>
    <div class="label">{{label}}</div>
    <div class="source"><span class="source-prefix">Source:</span> {{source}}</div>
  </div>
</body>
</html>
